<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b3e"/>
      <stop offset="100%" style="stop-color:#1a3a6b"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Línea decorativa superior -->
  <rect x="0" y="0" width="1200" height="5" fill="#1c61c0"/>

  <!-- Círculos decorativos sutiles -->
  <circle cx="1080" cy="120" r="220" fill="#1c61c0" opacity="0.07"/>
  <circle cx="1130" cy="530" r="160" fill="#5eb4fa" opacity="0.05"/>
  <circle cx="80"   cy="530" r="130" fill="#1c61c0" opacity="0.05"/>

  <!-- Badge logo circular -->
  <circle cx="116" cy="116" r="36" fill="#1c61c0"/>
  <text x="116" y="126" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="white" text-anchor="middle">C</text>

  <!-- Nombre marca -->
  <text x="168" y="108" font-family="Arial, sans-serif" font-size="34" font-weight="600" fill="white">Carolina</text>
  <!-- POS pill -->
  <rect x="365" y="85" width="62" height="32" rx="8" fill="#1c61c0"/>
  <text x="396" y="108" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">POS</text>

  <!-- Tagline principal -->
  <text x="80" y="285" font-family="Arial, sans-serif" font-size="60" font-weight="700" fill="white">Vende, factura y controla</text>
  <text x="80" y="360" font-family="Arial, sans-serif" font-size="60" font-weight="700" fill="white">tu negocio en Colombia.</text>

  <!-- Subtítulo -->
  <text x="80" y="425" font-family="Arial, sans-serif" font-size="26" fill="#93c5fd">POS · Facturación DIAN · Inventario · Cartera</text>

  <!-- Chips -->
  <rect x="80"  y="480" width="186" height="44" rx="22" fill="#1c61c0" opacity="0.25"/>
  <text x="173" y="508" font-family="Arial, sans-serif" font-size="17" fill="#bfdbfe" text-anchor="middle">✓ 100% DIAN</text>

  <rect x="282" y="480" width="220" height="44" rx="22" fill="#1c61c0" opacity="0.25"/>
  <text x="392" y="508" font-family="Arial, sans-serif" font-size="17" fill="#bfdbfe" text-anchor="middle">✓ Sin límite ventas</text>

  <rect x="518" y="480" width="238" height="44" rx="22" fill="#1c61c0" opacity="0.25"/>
  <text x="637" y="508" font-family="Arial, sans-serif" font-size="17" fill="#bfdbfe" text-anchor="middle">✓ Desde $189.000/mes</text>

  <!-- URL -->
  <text x="1120" y="595" font-family="Arial, sans-serif" font-size="19" fill="#64748b" text-anchor="end">carolinapos.co</text>
</svg>
